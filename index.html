<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart English Builder v13 Lemma Lexicon</title>
    <!-- 이미지 분석 OCR 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #166088;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #4c5c68;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 600px) {
            .upload-section {
                grid-template-columns: 1fr;
            }
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-weight: bold;
            color: var(--secondary-color);
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
            font-size: 15px;
        }

        .file-input-wrapper {
            position: relative;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background-color: #f8fafc;
            cursor: pointer;
            height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 15px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            display: none;
        }

        .result-header {
            font-weight: bold;
            font-size: 18px;
            color: var(--secondary-color);
            margin-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }

        .word-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background-color: #ffffff;
        }

        .word-table th, .word-table td {
            border: 1px solid #cbd5e1;
            padding: 10px 15px;
            text-align: left;
        }

        .word-table th {
            background-color: var(--primary-color);
            color: white;
        }

        .word-table tr:nth-child(even) {
            background-color: #f8fafc;
        }

        .editable-meaning {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 16px;
            color: #4c5c68;
        }
        .editable-meaning:focus {
            outline: 1px solid var(--primary-color);
            background-color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart English Builder v13 Lemma Lexicon</h1>
    
    <div class="upload-section">
        <div class="input-box">
            <label for="textInput">영어 텍스트 입력 (선택사항)</label>
            <textarea id="textInput" placeholder="여기에 영어 문장이나 본문을 입력하세요..."></textarea>
        </div>
        
        <div class="input-box">
            <label>이미지 파일 업로드 (선택사항)</label>
            <div class="file-input-wrapper">
                <span id="fileInputLabel">🖼️ 이미지를 드래그하거나 클릭하여 업로드</span>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            <div class="preview-container">
                <img id="imagePreview" alt="업로드 이미지 미리보기">
            </div>
        </div>
    </div>

    <button class="btn" id="processBtn">작동 및 생성하기</button>

    <div class="result-section" id="resultSection">
        <div class="result-header">생성된 학습 자료 결과</div>
        <div id="outputText"></div>
    </div>
</div>

<script>
    // 기초 필터링 단어 목록
    const trashWords = new Set([
        "the", "a", "an", "and", "or", "but", "to", "in", "on", "at", "by", "for", "with", "about", "of", "from", "up", "down", 
        "i", "my", "me", "mine", "you", "your", "he", "his", "him", "she", "her", "it", "its", "we", "our", "us", "they", "their", "them",
        "is", "am", "are", "was", "were", "be", "been", "being", "do", "does", "did", "done", "have", "has", "had",
        "this", "that", "these", "those", "there", "here", "when", "where", "who", "which", "why", "how",
        "one", "two", "three", "four", "five", "six", "seven", "eight", "nine", "ten", "first", "second", "third",
        "all", "any", "some", "no", "not", "very", "so", "too", "can", "will", "would", "could", "should", "may", "must", "even",
        "people", "always", "time", "day", "year", "good", "new", "old", "great", "well", "said", "bmodel", "html", "container",
        "might", "more", "most", "often", "only", "other", "many", "much", "each", "every", "own", "another", "into", "out",
        "then", "than", "like", "just", "make", "made", "go", "went", "come", "came", "see", "saw", "take", "took", "get", "got",
        "know", "think", "look", "back", "after", "before", "through", "over", "under", "between", "both", "also", "again",
        "work", "life", "world", "man", "woman", "child", "thing", "way", "give", "find", "use", "tell", "ask", "seem", "feel"
    ]);

    // [표제어 원형화 대응] 필수 탑재 정밀 교정용 DB
    const coreMap = {
        "introduce": "소개하다",
        "purchasing": "구매하다, 구입하다",
        "purchase": "구매하다, 구입하다",
        "repeatedly": "반복적으로, 여러 차례",
        "sales": "판매, 매출",
        "sale": "판매, 매출",
        "consumer": "소비자", 
        "expensive": "비싼, 고가의", 
        "goods": "상품, 제품", 
        "income": "수입, 소득", 
        "information": "정보",
        "item": "물품, 항목", 
        "large": "큰, 대규모의", 
        "least": "최소한의", 
        "less": "더 적은", 
        "losing": "잃다, 지다",
        "lose": "잃다, 지다",
        "low": "낮은", 
        "manipulated": "조작하다, 교묘히 다루다", 
        "manipulate": "조작하다, 교묘히 다루다",
        "manufactured": "제조하다", 
        "manufacture": "제조하다",
        "manufacturer": "제조회사, 제조업체",
        "margin": "이윤, 마진, 여백", 
        "middle": "중간의", 
        "model": "모델, 모형", 
        "money": "돈, 자금",
        "unaware": "알지 못하는", 
        "unnecessary": "불필요한", 
        "willing": "기꺼이 ~하는", 
        "wrong": "틀린, 잘못된",
        "bought": "사다", 
        "buy": "사다",
        "company": "회사, 기업", 
        "compare": "비교하다", 
        "discounted": "할인하다", 
        "discount": "할인하다",
        "discovered": "발견하다",
        "discover": "발견하다",
        "electronics": "전자제품", 
        "exposed": "노출시키다, 드러내다", 
        "expose": "노출시키다, 드러내다",
        "fanciest": "가장 화려한, 고급스러운", 
        "fancy": "화려한, 고급스러운",
        "features": "특징, 기능 / 특징으로 삼다", 
        "feature": "특징, 기능 / 특징으로 삼다",
        "fooled": "속이다",
        "fool": "속이다",
        "persuaded": "설득하다", 
        "persuade": "설득하다",
        "presence": "존재, 출석", 
        "price": "가격, 대가", 
        "priced": "가격을 책정하다",
        "offers": "제안하다, 제공하다",
        "offer": "제안하다, 제공하다",
        "keep": "유지하다, 보관하다",
        "ink": "잉크",
        "jet": "제트기, 분출"
    };

    // [신규] 동사를 원형으로 변환하고 명사 복수형을 단수형으로 정규화하는 규칙 기반 엔진
    function getLemma(word) {
        let lemma = word.toLowerCase().trim();
        if (coreMap[lemma]) return lemma; // 직접 사전에 존재하면 즉시 반환

        // 1. 동사 복수형 및 명사 복수형 어미 처리 (-es, -s)
        if (lemma.endsWith("ies")) {
            const tryY = lemma.slice(0, -3) + "y";
            if (coreMap[tryY]) return tryY;
        }
        if (lemma.endsWith("es")) {
            // introduces -> introduce 대응
            const trySe = lemma.slice(0, -1); 
            if (coreMap[trySe]) return trySe;
            const tryBase = lemma.slice(0, -2);
            if (coreMap[tryBase]) return tryBase;
        }
        if (lemma.endsWith("s") && !lemma.endsWith("ss")) {
            const tryBase = lemma.slice(0, -1);
            if (coreMap[tryBase]) return tryBase;
        }

        // 2. 과거형/과거분사 어미 처리 (-ed)
        if (lemma.endsWith("ed")) {
            if (lemma.endsWith("ied")) {
                return lemma.slice(0, -3) + "y";
            }
            // 원래 e로 끝나는 동사의 경우 (ex: persuaded -> persuade)
            const tryE = lemma.slice(0, -1);
            if (coreMap[tryE]) return tryE;
            const tryBase = lemma.slice(0, -2);
            if (coreMap[tryBase]) return tryBase;
        }

        // 3. 진행형/현재분사 어미 처리 (-ing)
        if (lemma.endsWith("ing")) {
            if (lemma.endsWith("ying")) {
                return lemma.slice(0, -4) + "y";
            }
            // e가 탈락하고 ing가 붙은 경우 (ex: purchasing -> purchase)
            const tryE = lemma.slice(0, -3) + "e";
            if (coreMap[tryE]) return tryE;
            const tryBase = lemma.slice(0, -3);
            if (coreMap[tryBase]) return tryBase;
        }

        return lemma;
    }

    // 사전식 표준 원형 뜻 정제 시스템
    async function getAdvancedMeaning(word) {
        const clean = word.toLowerCase().trim();
        if (clean.length <= 2 || trashWords.has(clean)) return null;

        // DB 확인
        if (coreMap[clean]) return coreMap[clean];

        try {
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${clean}&langpair=en|ko`);
            if (!response.ok) return "🔍 뜻 직접 입력";
            
            const data = await response.json();
            let text = data.responseData?.translatedText;

            if (!text || text.toLowerCase() === clean || /[a-zA-Z]{4,}/.test(text)) {
                return null; 
            }

            // [정교화 수술] 문장형 꼬리표(~합니다, ~입니다, 찌꺼기 오타 알파벳) 완벽 정형화 필터링
            text = text.replace(/[a-zA-Z]$/, '').trim(); // '유지c' 같은 끝자리 오타 제거
            text = text.replace(/(합니다|칩니다|옵니다|습니다|정합니다)$/, "하다"); 
            text = text.replace(/(소개합니다)$/, "소개하다");
            text = text.replace(/(입니다|의미합니다|뜻합니다)$/, "");

            return text;
        } catch (e) {
            return "🔍 뜻 직접 입력";
        }
    }

    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const fileInputLabel = document.getElementById('fileInputLabel');
    const processBtn = document.getElementById('processBtn');
    const resultSection = document.getElementById('resultSection');
    const outputText = document.getElementById('outputText');
    const textInput = document.getElementById('textInput');

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            fileInputLabel.textContent = `📁 선택된 파일: ${file.name}`;
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });

    processBtn.addEventListener('click', async function() {
        const textValue = textInput.value.trim();
        const hasImage = imageInput.files.length > 0;

        if (!textValue && !hasImage) {
            alert('텍스트를 입력하거나 이미지 파일을 업로드해 주세요!');
            return;
        }

        resultSection.style.display = 'block';
        processBtn.disabled = true;
        processBtn.textContent = "AI 표제어 원형화 정밀 분석 중...";
        outputText.innerHTML = "🔄 <strong>알림:</strong> 추출된 단어를 동사원형 및 명사 단수형으로 복원하여 매칭 중입니다...<br>";

        let finalRawText = textValue;

        if (hasImage) {
            try {
                const imageFile = imageInput.files[0];
                const worker = await Tesseract.createWorker('eng');
                const result = await worker.recognize(imageFile);
                finalRawText += "\n" + result.data.text;
                await worker.terminate();
            } catch (error) {
                console.error(error);
            }
        }

        const rawWords = finalRawText.toLowerCase().match(/[a-zA-Z]+/g);
        
        if (rawWords && rawWords.length > 0) {
            // [업데이트] 단어 원형(Lemma) 과정을 거쳐 중복 제거 및 정렬 수행
            const lemmaWords = rawWords.map(w => getLemma(w));
            const uniqueWords = [...new Set(lemmaWords)].sort();
            
            let resultHTML = `<strong>📚 [원형 추출 및 사전식 교정 완료 단어장]</strong><br>`;
            resultHTML += `<span style="font-size:13px; color:#4a6fa5;">💡 모든 동사는 원형(~하다)으로 복원되었으며, 명사는 단수형 표준 표기가 원칙으로 지정되었습니다.</span>`;
            resultHTML += `<table class="word-table">`;
            resultHTML += `<thead><tr><th>번호</th><th>영어 단어 (원형)</th><th>사전형 한글 뜻</th></tr></thead>`;
            resultHTML += `<tbody id="tableBody">`;
            
            outputText.innerHTML = resultHTML + `</tbody></table>`;
            const tableBody = document.getElementById('tableBody');

            let count = 1;

            for (const word of uniqueWords) {
                if (word.length <= 2 || trashWords.has(word)) continue;

                const meaning = await getAdvancedMeaning(word);
                if (!meaning) continue;

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${count}</td>
                    <td><strong>${word}</strong></td>
                    <td><input type="text" class="editable-meaning" value="${meaning}"></td>
                `;
                tableBody.appendChild(row);
                count++;
            }

            if(count === 1) {
                outputText.innerHTML = "❌ 조건에 맞는 영어 중요 단어가 발견되지 않았습니다.";
            }
            
        } else {
            outputText.innerHTML = "❌ 분석할 수 있는 영어 단어가 지문에서 발견되지 않았습니다.";
        }

        processBtn.disabled = false;
        processBtn.textContent = "작동 및 생성하기";
    });
</script>

</body>
</html>
