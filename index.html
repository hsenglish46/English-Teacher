<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart English Builder v8 Ultimate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #166088;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #4c5c68;
            --accent-color: #e07a5f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 600px) {
            .upload-section {
                grid-template-columns: 1fr;
            }
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-weight: bold;
            color: var(--secondary-color);
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
            font-size: 15px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .file-input-wrapper {
            position: relative;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background-color: #f8fafc;
            cursor: pointer;
            transition: all 0.3s ease;
            height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .file-input-wrapper:hover {
            border-color: var(--primary-color);
            background-color: #f0f4f8;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .preview-container {
            margin-top: 15px;
            text-align: center;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 8px;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--secondary-color);
        }

        .btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            display: none;
        }

        .result-header {
            font-weight: bold;
            font-size: 18px;
            color: var(--secondary-color);
            margin-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }

        .output-text {
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        
        .word-list {
            margin-top: 10px;
            padding-left: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart English Builder v8 Ultimate</h1>
    
    <div class="upload-section">
        <div class="input-box">
            <label for="textInput">영어 텍스트 입력 (선택사항)</label>
            <textarea id="textInput" placeholder="여기에 영어 문장이나 본문을 입력하세요..."></textarea>
        </div>
        
        <div class="input-box">
            <label>이미지 파일 업로드 (선택사항)</label>
            <div class="file-input-wrapper">
                <span id="fileInputLabel">🖼️ 이미지를 드래그하거나 클릭하여 업로드</span>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            <div class="preview-container">
                <img id="imagePreview" alt="업로드 이미지 미리보기">
            </div>
        </div>
    </div>

    <button class="btn" id="processBtn">작동 및 생성하기</button>

    <div class="result-section" id="resultSection">
        <div class="result-header">생성된 학습 자료 결과</div>
        <div class="output-text" id="outputText"></div>
    </div>
</div>

<script>
    // 라이브러리 로드 실패 시 화면 먹통 방지용 안전장치
    window.addEventListener('error', function(e) {
        if (e.message.includes('Tesseract')) {
            console.warn('Tesseract 라이브러리 로드 지연 또는 차단 발생. 대체 모드로 전환합니다.');
        }
    });

    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const fileInputLabel = document.getElementById('fileInputLabel');
    const processBtn = document.getElementById('processBtn');
    const resultSection = document.getElementById('resultSection');
    const outputText = document.getElementById('outputText');
    const textInput = document.getElementById('textInput');

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            fileInputLabel.textContent = `📁 선택된 파일: ${file.name}`;
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        } else {
            resetImagePreview();
        }
    });

    function resetImagePreview() {
        imagePreview.src = '';
        imagePreview.style.display = 'none';
        fileInputLabel.textContent = '🖼️ 이미지를 드래그하거나 클릭하여 업로드';
    }

    processBtn.addEventListener('click', async function() {
        const textValue = textInput.value.trim();
        const hasImage = imageInput.files.length > 0;

        if (!textValue && !hasImage) {
            alert('텍스트를 입력하거나 이미지 파일을 업로드해 주세요!');
            return;
        }

        resultSection.style.display = 'block';
        processBtn.disabled = true;
        processBtn.textContent = "분석 진행 중...";
        outputText.innerHTML = "🔄 <strong>알림:</strong> 학습 자료를 구성하고 있습니다. 잠시만 기다려 주세요...<br>";
        resultSection.scrollIntoView({ behavior: 'smooth' });

        let finalRawText = textValue;

        if (hasImage) {
            outputText.innerHTML += "📸 <strong>[이미지 분석 중]:</strong> 이미지에서 영어 텍스트를 추출하고 있습니다...<br>";
            
            // Tesseract 존재 여부 체크 후 동적 분석 진행
            if (typeof Tesseract !== 'undefined') {
                try {
                    const imageFile = imageInput.files[0];
                    // [수정 완료]: corePath와 workerPath를 모두 명시하여 로컬 file:/// 환경 보안 정책 우회
                    const result = await Tesseract.recognize(imageFile, 'eng', {
                        corePath: 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js-core/4.0.1/tesseract-core.wasm.js',
                        workerPath: 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/worker.min.js'
                    });
                    const extractedText = result.data.text;
                    
                    if (extractedText.trim()) {
                        outputText.innerHTML += "✅ <strong>[이미지 인식 완료]:</strong> 글자 추출에 성공했습니다.<br><br>";
                        finalRawText += "\n" + extractedText;
                    } else {
                        outputText.innerHTML += "⚠️ <strong>[주의]:</strong> 이미지에서 선명한 텍스트를 찾지 못했습니다.<br><br>";
                    }
                } catch (error) {
                    console.error(error);
                    outputText.innerHTML += "❌ <strong>[보안 차단 안내]:</strong> 브라우저 보안 정책으로 이미지 분석 엔진이 차단되었습니다. 일반 텍스트만 처리합니다.<br><br>";
                }
            } else {
                outputText.innerHTML += "⚠️ <strong>[엔진 미로드]:</strong> 분석 엔진 라이브러리가 차단되었습니다. 일반 입력 텍스트로 대체합니다.<br><br>";
            }
        }

        // 단어 정제 및 화면 출력
        const words = finalRawText.toLowerCase().match(/[a-zA-Z]+/g);
        
        if (words && words.length > 0) {
            const uniqueWords = [...new Set(words)].sort();
            let resultHTML = `<strong>📚 [추출된 단어 리스트 - 총 ${uniqueWords.length}개]</strong><br>`;
            resultHTML += `<ul class="word-list">`;
            uniqueWords.forEach(word => {
                if(word.length > 1) {
                    resultHTML += `<li>${word}</li>`;
                }
            });
            resultHTML += `</ul>`;
            outputText.innerHTML += resultHTML;
        } else {
            outputText.innerHTML += "❌ 분석할 수 있는 영어 단어가 발견되지 않았습니다.";
        }

        processBtn.disabled = false;
        processBtn.textContent = "작동 및 생성하기";
    });
</script>

</body>
</html>
