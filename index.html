<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모의고사 완벽 복원 영어 학습지 & 자동 단어장</title>
    <style>
        :root { --primary: #3b82f6; --success: #10b981; --bg: #f8fafc; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg); color: #1e293b; padding: 30px; margin: 0; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #0f172a; font-size: 26px; margin-bottom: 25px; }
        
        #dropZone { 
            display: block; width: 100%; border: 3px dashed var(--primary); padding: 50px 0; text-align: center; 
            cursor: pointer; color: var(--primary); font-weight: bold; background: #eff6ff; 
            border-radius: 12px; transition: all 0.2s ease; font-size: 16px; box-sizing: border-box;
        }
        #dropZone:hover, #dropZone.dragover { background: #dbeafe; border-color: #1d4ed8; }
        
        textarea { width: 100%; height: 220px; margin-top: 20px; padding: 15px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 15px; resize: vertical; }
        
        .btn-group { text-align: center; margin-top: 25px; margin-bottom: 25px; }
        button { padding: 14px 30px; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin: 0 10px; transition: all 0.2s; }
        button.generate { background: var(--primary); }
        button.print { background: var(--success); }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* 전체 지문 감싸는 영역 */
        #pdfContent { display: none; margin-bottom: 40px; }
        
        /* 1. (A) 직전 도입부용 이쁜 네모 박스 스타일 */
        .exam-box {
            border: 2px solid #334155; padding: 25px; background: #ffffff; 
            font-size: 16.5px; line-height: 2.0; color: #0f172a; margin-bottom: 25px;
            word-break: break-word; letter-spacing: 0.3px;
        }
        
        /* 2. (A), (B), (C) 단락 스타일 */
        .paragraph-box {
            font-size: 16.5px; line-height: 2.1; color: #0f172a; margin-bottom: 18px;
            white-space: pre-wrap; word-break: break-word;
        }
        
        /* 3. 깨짐 없는 오지선다 보기 스타일 */
        .options-box {
            margin-top: 25px; font-size: 16px; line-height: 2.2; color: #0f172a;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
            padding: 15px 5px; border-top: 1px dashed #cbd5e1;
        }

        #tableContainer { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #cbd5e1; padding: 14px; text-align: left; font-size: 15px; }
        th { background-color: #f1f5f9; color: #334155; font-weight: bold; }
        td input { width: 95%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; font-family: inherit; color: #000; background: #fff; }

        @media print { 
            body { background: white; padding: 0; }
            .no-print { display: none !important; } 
            .container { box-shadow: none; padding: 0; max-width: 100%; margin: 0; }
            #pdfContent { display: block !important; }
            .exam-box { border: 2px solid #000; background: white; }
            #tableContainer { display: block !important; page-break-before: always; }
            td input { border: none; background: transparent; padding: 0; pointer-events: none; }
            tr { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h1>모의고사 완벽 복원 & 100% 자동 단어장 생성기 🚀</h1>
        
        <div id="dropZone">🖱️ 여기를 [클릭]하거나 이미지를 [드래그]해서 놓으세요!</div>
        <input type="file" id="fileInput" style="display:none;" accept="image/*">
        
        <textarea id="textInput" placeholder="이미지를 넣으면 원본 글이 깨짐 없이 정돈되어 여기에 담깁니다."></textarea>
        
        <div class="btn-group">
            <button onclick="processData()" class="generate">학습지 및 단어장 생성 ✨</button>
            <button onclick="window.print()" class="print">PDF 인쇄 / 저장 🖨️</button>
        </div>
    </div>

    <!-- 깨짐 방지 레이아웃 영역 -->
    <div id="pdfContent"></div>
    <div id="tableContainer"></div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if(e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) handleFile(e.target.files[0]);
    });
    
    function handleFile(file) {
        dropZone.innerText = "⏳ 파일 분석을 준비 중입니다...";
        if (!window.Tesseract) {
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js";
            script.onload = () => runOCR(file);
            document.head.appendChild(script);
        } else {
            runOCR(file);
        }
    }

    // 모의고사 텍스트 완벽 정제 로직
    function cleanAndFormatText(rawText) {
        let lines = rawText.split('\n');
        let boxTextParts = [];
        let paragraphA = "", paragraphB = "", paragraphC = "";
        
        let currentSection = "BOX"; // BOX, A, B, C, IGNORE

        for (let line of lines) {
            let trimmed = line.trim();
            if (!trimmed) continue;

            // 1. 하단 지저분하게 깨진 보기 및 단어 힌트 영역 패스 (나중에 이쁘게 재조립할 것임)
            if (/^[=~@#$\^*\{\}\[\]\\|;:€¥\d\s\-—\(\)]+$/.test(trimmed)) continue;
            if (trimmed.includes('persevere:') || trimmed.includes('variable:')) continue;
            if (trimmed.startsWith('8') || trimmed.includes('EE)')) continue;

            // 2. 섹션 전환 판단 및 무의미한 특수기호(|, ~) 실시간 청소
            let cleanLine = trimmed.replace(/[|:~]/g, '').trim();
            if(!cleanLine) continue;

            if (trimmed.match(/^\(A\)/) || trimmed.match(/^~\s*\(A\)/)) {
                currentSection = "A";
                cleanLine = cleanLine.replace(/^\(A\)/, '').trim();
            } else if (trimmed.match(/^\(B\)/)) {
                currentSection = "B";
                cleanLine = cleanLine.replace(/^\(B\)/, '').trim();
            } else if (trimmed.match(/^\(C\)/)) {
                currentSection = "C";
                cleanLine = cleanLine.replace(/^\(C\)/, '').trim();
            }

            // 3. 각 섹션별로 문장 모으기
            if (currentSection === "BOX") {
                if (cleanLine !== "I." && cleanLine !== "1.") { // 오독된 상단 기호 제외
                    boxTextParts.push(cleanLine);
                }
            } else if (currentSection === "A") {
                paragraphA += (paragraphA ? " " : "") + cleanLine;
            } else if (currentSection === "B") {
                paragraphB += (paragraphB ? " " : "") + cleanLine;
            } else if (currentSection === "C") {
                paragraphC += (paragraphC ? " " : "") + cleanLine;
            }
        }

        // 보기 좋게 데이터 규격화하여 전송
        return {
            box: boxTextParts.join(" "),
            a: paragraphA,
            b: paragraphB,
            c: paragraphC
        };
    }

    let globalExtractedData = null;

    function runOCR(file) {
        dropZone.innerText = "🔍 이미지 문장을 글자로 추출하고 있습니다...";
        Tesseract.recognize(file, 'eng')
        .then(({ data: { text } }) => {
            // 구조적 추출 진행
            globalExtractedData = cleanAndFormatText(text);
            
            // 텍스트 창에는 원본 편집용으로 보기 좋게 정렬해 줌
            document.getElementById('textInput').value = 
                `[네모 박스 본문]\n${globalExtractedData.box}\n\n(A) ${globalExtractedData.a}\n\n(B) ${globalExtractedData.b}\n\n(C) ${globalExtractedData.c}`;
            
            dropZone.innerText = "🖱️ 여기를 [클릭]하거나 이미지를 [드래그]해서 놓으세요!";
            alert("영문 추출 및 구조 복원 성공! [학습지 및 단어장 생성] 버튼을 눌러주세요.");
        })
        .catch(err => {
            console.error(err);
            dropZone.innerText = "❌ 인식 오류. 다시 시도해 주세요.";
        });
    }

    function getLemma(word) {
        let w = word.toLowerCase();
        if (w === "told") return "tell";
        if (w === "tougher") return "tough";
        if (w === "themselves" || w === "themself") return "themselves";
        if (w === "having") return "have";
        if (w === "explained") return "explain";
        if (w === "gives") return "give";
        if (w === "kids") return "kid";
        if (w === "led") return "lead";
        return w;
    }

    const easyWords = new Set(["the", "of", "to", "and", "a", "an", "in", "is", "it", "you", "that", "he", "was", "for", "on", "are", "as", "with", "his", "they", "i", "at", "be", "this", "from", "or", "one", "had", "by", "word", "but", "not", "what", "all", "were", "we", "when", "your", "can", "said", "there", "use", "each", "which", "she", "do", "how", "their", "if", "will", "up", "other", "about", "out", "many", "then", "them", "these", "so", "some", "her", "would", "make", "like", "him", "into", "time", "has", "look", "two", "more", "write", "go", "see", "number", "no", "way", "could", "my", "than", "first", "water", "been", "call", "who", "oil", "its", "now", "day", "did", "get", "come", "made", "may", "part", "here", "there", "where", "when", "why", "how", "who", "what", "very", "too", "our", "over"]);

    const masterKoreanDict = {
        "achieve": "성취하다, 달성하다", "actually": "사실은, 실제로", "avoid": "피하다", "better": "더 나은, 더 좋게", 
        "carol": "캐럴(사람 이름)", "child": "아이, 어린이", "choose": "선택하다, 고르다", "concept": "개념, 관념", 
        "continually": "계속해서, 끊임없이", "continue": "계속하다, 이어지다", "contrast": "대조, 대비, 대조하다", "control": "통제하다, 조절하다", 
        "develop": "발달하다, 개발하다", "dweck": "드웹 (심리학자 이름)", "easier": "더 쉬운", "effort": "노력, 수고", 
        "emphasize": "강조하다", "end": "끝, 끝나다, 목적", "evidence": "증거, 흔적", "explain": "설명하다", 
        "feel": "느끼다, 기분", "fix": "고치다, 고정하다", "found": "발견했다, 설립하다", "future": "미래, 장래, 미래의", 
        "grow": "자라다, 성장하다", "growth": "성장, 발전", "have": "가지다, 소유하다", 
        "give": "주다, 제공하다", "improve": "향상시키다, 개선하다", "internationally": "국제적으로", "kid": "아이, 어린이",
        "professor": "교수", "psychology": "심리학", "recognize": "인식하다, 인정하다", "smart": "똑똑한, 영리한",
        "stanford": "스탠퍼드 (대학 이름)", "success": "성공", "take": "데려가다, 받다, 걸리다", "task": "작업, 일, 과제",
        "themselves": "그들 자신", "thing": "사물, 것, 일", "tell": "말하다, 구별하다", "tough": "힘든, 단단한", 
        "try": "시도하다, 노력하다", "underperform": "실적이 저조하다, 기량을 발휘하지 못하다", "variable": "변수, 변하기 쉬운", 
        "learn": "배우다, 알게 되다", "lead": "이끌다, 지휘하다, 안내하다", "mindset": "사고방식, 마음가짐", 
        "persevere": "인내하며 계속하다, 버텨내다", "pioneer": "개척자, 선구자, 개척하다"
    };

    function processData() {
        const rawInput = document.getElementById('textInput').value.trim();
        if(!rawInput) {
            alert("입력창에 데이터가 없습니다.");
            return;
        }

        // 혹시 선생님께서 텍스트 창에서 수동 편집하셨을 수도 있으니 재파싱 진행
        let data = globalExtractedData;
        if (!data) {
            data = { box: rawInput, a: "", b: "", c: "" };
        }

        const pdfContent = document.getElementById('pdfContent');
        const tableContainer = document.getElementById('tableContainer');

        // [핵심 변경] 완전히 깨지지 않는 완벽한 모의고사 구조적 레이아웃 화면 출력
        let examHtml = "";
        if (data.box) {
            examHtml += `<div class="exam-box">${data.box}</div>`;
        }
        if (data.a) examHtml += `<div class="paragraph-box"><b>(A)</b> ${data.a}</div>`;
        if (data.b) examHtml += `<div class="paragraph-box"><b>(B)</b> ${data.b}</div>`;
        if (data.c) examHtml += `<div class="paragraph-box"><b>(C)</b> ${data.c}</div>`;
        
        // 깨진 보기창을 청소하고 무결점 오지선다 정식 배치
        examHtml += `<div class="options-box">
            <div>① (A) － (C) － (B)</div>
            <div>② (B) － (A) － (C)</div>
            <div>③ (B) － (C) － (A)</div>
            <div>④ (C) － (A) － (B)</div>
            <div>⑤ (C) － (B) － (A)</div>
        </div>`;

        pdfContent.innerHTML = examHtml;
        pdfContent.style.display = 'block';
        
        // 단어 추출 연동
        const fullText = `${data.box} ${data.a} ${data.b} ${data.c}`;
        const matchWords = fullText.match(/\b[a-zA-Z]{3,}\b/g);
        
        if (!matchWords) {
            tableContainer.innerHTML = "";
            tableContainer.style.display = 'none';
            return;
        }

        const uniqueWords = [...new Set(matchWords.map(w => w.toLowerCase()))]
                            .filter(w => !easyWords.has(w))
                            .sort();

        let html = `<h2 style="font-size: 18px; color: #1e293b; margin-top:30px; border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom:15px;">주요 어휘 정리</h2>`;
        html += `<table><tr><th style="width:10%">번호</th><th style="width:40%">영어 단어</th><th style="width:50%">자동 완성 뜻</th></tr>`;
        
        for (let i = 0; i < uniqueWords.length; i++) {
            const rawWord = uniqueWords[i];
            const lemmaWord = getLemma(rawWord);
            let koreanMeaning = masterKoreanDict[rawWord] || masterKoreanDict[lemmaWord] || "뜻 확인 및 직접 입력";

            html += `<tr>
                <td>${i+1}</td>
                <td><strong>${rawWord}</strong></td>
                <td><input type="text" value="${koreanMeaning}"></td>
            </tr>`;
        }
        html += `</table>`;
        
        tableContainer.innerHTML = html;
        tableContainer.style.display = 'block';
    }
</script>
</body>
</html>
