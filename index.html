<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Center</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f8fafc;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%; max-width: 1100px; padding: 40px 20px; text-align: center;
        }
        h1 {
            font-size: 42px; color: #005088; margin-bottom: 10px; font-weight: bold;
        }
        .subtitle {
            font-size: 18px; color: #64748b; margin-bottom: 50px;
        }
        /* 카드 메뉴 스타일 (기존 2개에서 3개 배치용으로 가로 정렬 설정) */
        .menu-grid {
            display: flex; gap: 25px; justify-content: center; flex-wrap: wrap;
        }
        .menu-card {
            background: white; border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 40px 20px; width: 300px; text-align: center; text-decoration: none; color: inherit;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: all 0.25s ease;
        }
        .menu-card:hover {
            transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: #cbd5e1;
        }
        .icon {
            font-size: 50px; margin-bottom: 20px; display: block;
        }
        .card-title {
            font-size: 22px; font-weight: bold; color: #1e293b; margin-bottom: 12px;
        }
        .card-desc {
            font-size: 14px; color: #64748b; line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>English Learning Center</h1>
        <div class="subtitle">오늘의 학습 목표를 선택하세요</div>
        
        <div class="menu-grid">
            <a href="voca.html" class="menu-card">
                <span class="icon">📖</span>
                <div class="card-title">1. 단어 찾아보기</div>
                <div class="card-desc">교사용 자동 단어장 생성 및<br>모의고사 완벽 복원 학습기</div>
            </a>

            <a href="bug-game.html" class="menu-card">
                <span class="icon">🐛</span>
                <div class="card-title">2. 단어 게임</div>
                <div class="card-desc">나비야 단어줄게 (벌레 게임)<br>집중력과 단어 인지 능력 향상</div>
            </a>

            <a href="word-puzzle.html" class="menu-card">
                <span class="icon">🔠</span>
                <div class="card-title">3. 단어 퍼즐 제작</div>
                <div class="card-desc">초3부터 성인 수준까지<br>난이도별 단어 퍼즐 학습지 인쇄</div>
            </a>
        </div>
    </div>

</body>
</html>
