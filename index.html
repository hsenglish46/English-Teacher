<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English 클래스 메뉴판</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .menu-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .btn {
            display: block;
            background: #3498db;
            color: white;
            padding: 16px;
            margin: 15px 0;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }
        .btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(41, 128, 185, 0.3);
        }
        /* 각 버튼별 포인트 색상 */
        .btn-game { background: #e67e22; box-shadow: 0 4px 6px rgba(230, 126, 34, 0.2); }
        .btn-game:hover { background: #d35400; box-shadow: 0 6px 12px rgba(211, 84, 0, 0.3); }
        
        .btn-puzzle { background: #2ecc71; box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2); }
        .btn-puzzle:hover { background: #27ae60; box-shadow: 0 6px 12px rgba(39, 174, 96, 0.3); }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>🗣️ 초등 영어 학습 센터</h1>
        <p>오늘 공부할 활동을 선택하세요!</p>
        
        <a href="voca.html" class="btn">📝 단어장 & 모의고사 복원</a>
        
        <a href="bug-game.html" class="btn btn-game">🐛 나비야 단어줄게 게임</a>
        
        <a href="word%20puzzle.html" class="btn btn-puzzle">🔠 단어 퍼즐 학습지 제작</a>
    </div>

</body>
</html>
