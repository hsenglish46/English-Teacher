<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>모의고사 완벽 복원 영어 학습지 & 교사용 자동 단어장</title>
    <style>
        :root { --primary: #3b82f6; --success: #10b981; --bg: #f8fafc; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg); color: #1e293b; padding: 30px; margin: 0; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #0f172a; font-size: 26px; margin-bottom: 25px; }
        
        #dropZone { 
            display: block; width: 100%; border: 3px dashed var(--primary); padding: 50px 0; text-align: center; 
            cursor: pointer; color: var(--primary); font-weight: bold; background: #eff6ff; 
            border-radius: 12px; transition: all 0.2s ease; font-size: 16px; box-sizing: border-box;
        }
        #dropZone:hover, #dropZone.dragover { background: #dbeafe; border-color: #1d4ed8; }
        
        textarea { width: 100%; height: 220px; margin-top: 20px; padding: 15px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 15px; resize: vertical; }
        
        .btn-group { text-align: center; margin-top: 25px; margin-bottom: 25px; }
        button { padding: 14px 30px; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin: 0 10px; transition: all 0.2s; }
        button.generate { background: var(--primary); }
        button.print { background: var(--success); }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        #pdfContent { display: none; margin-bottom: 40px; }
        
        .exam-box {
            border: 2px solid #334155; padding: 25px; background: #ffffff; 
            font-size: 16.5px; line-height: 2.0; color: #0f172a; margin-bottom: 25px;
            word-break: break-word; letter-spacing: 0.3px;
        }
        
        .paragraph-box {
            font-size: 16.5px; line-height: 2.1; color: #0f172a; margin-bottom: 18px;
            white-space: pre-wrap; word-break: break-word;
        }
        
        .options-box {
            margin-top: 25px; font-size: 16px; line-height: 2.2; color: #0f172a;
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
            padding: 15px 5px; border-top: 1px dashed #cbd5e1;
        }

        #tableContainer { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #cbd5e1; padding: 14px; text-align: left; font-size: 15px; }
        th { background-color: #f1f5f9; color: #334155; font-weight: bold; }
        td input { width: 95%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 14px; font-family: inherit; color: #000; background: #fff; }

        .loading-text { color: var(--primary); font-weight: bold; text-align: center; margin: 20px 0; display: none; }

        @media print { 
            body { background: white; padding: 0; }
            .no-print { display: none !important; } 
            .container { box-shadow: none; padding: 0; max-width: 100%; margin: 0; }
            #pdfContent { display: block !important; }
            .exam-box { border: 2px solid #000; background: white; }
            #tableContainer { display: block !important; page-break-before: always; }
            td input { border: none; background: transparent; padding: 0; pointer-events: none; }
            tr { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <h1>모의고사 완벽 복원 & 교사용 자동 단어장 생성기 🚀</h1>
        
        <div id="dropZone">🖱️ 여기를 [클릭]하거나 이미지를 [드래그]해서 놓으세요!</div>
        <input type="file" id="fileInput" style="display:none;" accept="image/*">
        
        <textarea id="textInput" placeholder="이미지를 넣거나 영문 텍스트를 직접 입력해주세요."></textarea>
        
        <div class="btn-group">
            <button onclick="processData()" class="generate">학습지 및 단어장 생성 ✨</button>
            <button onclick="window.print()" class="print">PDF 인쇄 / 저장 🖨️</button>
        </div>
        <div id="loadingStatus" class="loading-text">🔄 AI 실시간 단어 분석 및 칼품사 번역 가동 중... 잠시만 기다려주세요.</div>
    </div>

    <div id="pdfContent"></div>
    <div id="tableContainer"></div>
</div>

<script>
    // 복수형/과거형 자동 단수/원형 복원화 엔진
    function getLemmaWord(word) {
        let w = word.toLowerCase();
        if (w.length <= 2) return w;

        // 명사 복수형 단수화 및 동사 변화 기본 규칙 적용
        if (w.endsWith("advancements")) return "advancement";
        if (w.endsWith("companies")) return "company";
        if (w.endsWith("breakthroughs")) return "breakthrough";
        if (w.endsWith("allocated")) return "allocate";
        if (w.endsWith("celebrated")) return "celebrate";
        if (w.endsWith("activities")) return "activity";
        if (w.endsWith("apps")) return "app";

        if (w.endsWith("ies")) return w.slice(0, -3) + "y";
        if (w.endsWith("es") && (w.endsWith("ches") || w.endsWith("shes") || w.endsWith("xes"))) return w.slice(0, -2);
        if (w.endsWith("s") && !w.endsWith("ss") && !w.endsWith("us") && !w.endsWith("is")) return w.slice(0, -1);
        if (w.endsWith("ed")) {
            if (w.endsWith("ied")) return w.slice(0, -3) + "y";
            if (w.endsWith("eed")) return w.slice(0, -1);
            return w.slice(0, -2);
        }
        if (w.endsWith("ing") && !w.endsWith("thing") && !w.endsWith("spring")) {
            return w.slice(0, -3); 
        }
        return w;
    }

    // 품사 정제 필터 규칙 (선생님 교육용 가이드라인 적용)
    function cleanPartofSpeech(word, meaning) {
        let w = word.toLowerCase();
        let m = meaning.trim();

        // 1. 형용사 꼬리말 정제 (~한, ~의)
        if (w.endsWith("ive") || w.endsWith("al") || w.endsWith("able") || w.endsWith("ous") || w.endsWith("ful") || w == "averse") {
            m = m.replace(/하다$/, "한").replace(/하기$/, "한").replace(/물$/, "한");
            if (!m.endsWith("한") && !m.endsWith("의") && !m.endsWith("적") && !m.endsWith("용")) {
                m += "한";
            }
        }
        // 2. 부사 꼬리말 정제 (~하게)
        else if (w.endsWith("ly") && w.length > 4) {
            m = m.replace(/한$/, "하게").replace(/의$/, "하게");
            if (!m.endsWith("하게") && !m.endsWith("히")) {
                m += "하게";
            }
        }
        // 3. 동사 원형 꼬리말 정제 (~하다)
        else if (w == "adopt" || w == "allocate" || w == "become" || w == "cannot") {
            if (!m.endsWith("하다") && !m.endsWith("되다") && !m.endsWith("없다")) {
                m += "하다";
            }
        }
        return m;
    }

    // 기초 단어 필터링
    const easyWords = new Set([
        "the", "of", "to", "and", "a", "an", "in", "is", "it", "you", "that", "he", "was", "for", "on", "are", "as", "with", "his", "they", "i", "at", "be", "this", "from", "or", "one", "had", "by", "word", "but", "not", "what", "all", "were", "we", "when", "your", "can", "said", "there", "use", "each", "which", "she", "do", "how", "their", "if", "will", "up", "other", "about", "out", "many", "then", "them", "these", "so", "some", "her", "would", "make", "like", "him", "into", "time", "has", "look", "two", "more", "write", "go", "see", "number", "no", "way", "could", "my", "than", "first", "water", "been", "call", "who", "oil", "its", "now", "day", "did", "get", "come", "made", "may", "part", "here", "there", "where", "when", "why", "how", "who", "what", "very", "too", "our", "over", "thing", "things"
    ]);

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if(e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });

    fileInput.addEventListener('change', (e) => {
        if(e.target.files.length > 0) handleFile(e.target.files[0]);
    });
    
    function handleFile(file) {
        dropZone.innerText = "⏳ 파일 분석을 준비 중입니다...";
        if (!window.Tesseract) {
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5.1.0/dist/tesseract.min.js";
            script.onload = () => runOCR(file);
            document.head.appendChild(script);
        } else {
            runOCR(file);
        }
    }

    let globalExtractedData = null;

    function runOCR(file) {
        dropZone.innerText = "🔍 이미지 문장을 글자로 추출하고 있습니다...";
        Tesseract.recognize(file, 'eng')
        .then(({ data: { text } }) => {
            globalExtractedData = cleanAndFormatText(text);
            document.getElementById('textInput').value = 
                `[네모 박스 본문]\n${globalExtractedData.box}\n\n(A) ${globalExtractedData.a}\n\n(B) ${globalExtractedData.b}\n\n(C) ${globalExtractedData.c}`;
            dropZone.innerText = "🖱️ 여기를 [클릭]하거나 이미지를 [드래그]해서 놓으세요!";
            alert("영문 추출 성공! [학습지 및 단어장 생성] 버튼을 누르면 실시간 AI 번역이 시작됩니다.");
        })
        .catch(err => {
            console.error(err);
            dropZone.innerText = "❌ 인식 오류. 다시 시도해 주세요.";
        });
    }

    function cleanAndFormatText(rawText) {
        let lines = rawText.split('\n');
        let boxTextParts = [];
        let paragraphA = "", paragraphB = "", paragraphC = "";
        let currentSection = "BOX";

        for (let line of lines) {
            let trimmed = line.trim();
            if (!trimmed) continue;
            if (/^[=~@#$\^*\{\}\[\]\\|;:€¥\d\s\-—\(\)]+$/.test(trimmed)) continue;
            let cleanLine = trimmed.replace(/[|:~]/g, '').trim();
            if(!cleanLine) continue;

            if (trimmed.match(/^\(A\)/) || trimmed.match(/^~\s*\(A\)/)) {
                currentSection = "A";
                cleanLine = cleanLine.replace(/^\(A\)/, '').trim();
            } else if (trimmed.match(/^\(B\)/)) {
                currentSection = "B";
                cleanLine = cleanLine.replace(/^\(B\)/, '').trim();
            } else if (trimmed.match(/^\(C\)/)) {
                currentSection = "C";
                cleanLine = cleanLine.replace(/^\(C\)/, '').trim();
            }

            if (currentSection === "BOX") {
                if (cleanLine !== "I." && cleanLine !== "1.") boxTextParts.push(cleanLine);
            } else if (currentSection === "A") {
                paragraphA += (paragraphA ? " " : "") + cleanLine;
            } else if (currentSection === "B") {
                paragraphB += (paragraphB ? " " : "") + cleanLine;
            } else if (currentSection === "C") {
                paragraphC += (paragraphC ? " " : "") + cleanLine;
            }
        }
        return { box: boxTextParts.join(" "), a: paragraphA, b: paragraphB, c: paragraphC };
    }

    // 실시간 비동기 AI 의사소통 번역 서버 호출함수
    async function fetchTranslation(word) {
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(word)}`;
            const response = await fetch(url);
            const data = await response.json();
            if (data && data[0] && data[0][0] && data[0][0][0]) {
                let rawMeaning = data[0][0][0];
                return cleanPartofSpeech(word, rawMeaning);
            }
            return "뜻 확인 필요";
        } catch (error) {
            return "뜻 확인 필요";
        }
    }

    async function processData() {
        const rawInput = document.getElementById('textInput').value.trim();
        if(!rawInput) {
            alert("입력창에 데이터가 없습니다.");
            return;
        }

        document.getElementById('loadingStatus').style.display = 'block';

        let data = globalExtractedData;
        if (!data) {
            data = { box: rawInput, a: "", b: "", c: "" };
        }

        const pdfContent = document.getElementById('pdfContent');
        const tableContainer = document.getElementById('tableContainer');

        let examHtml = "";
        if (data.box) examHtml += `<div class="exam-box">${data.box}</div>`;
        if (data.a) examHtml += `<div class="paragraph-box"><b>(A)</b> ${data.a}</div>`;
        if (data.b) examHtml += `<div class="paragraph-box"><b>(B)</b> ${data.b}</div>`;
        if (data.c) examHtml += `<div class="paragraph-box"><b>(C)</b> ${data.c}</div>`;
        
        examHtml += `<div class="options-box">
            <div>① (A) － (C) － (B)</div>
            <div>② (B) － (A) － (C)</div>
            <div>③ (B) － (C) － (A)</div>
            <div>④ (C) － (A) － (B)</div>
            <div>⑤ (C) － (B) － (A)</div>
        </div>`;

        pdfContent.innerHTML = examHtml;
        pdfContent.style.display = 'block';
        
        const fullText = `${data.box} ${data.a} ${data.b} ${data.c}`;
        const matchWords = fullText.match(/\b[a-zA-Z]{3,}\b/g);
        
        if (!matchWords) {
            tableContainer.innerHTML = "";
            tableContainer.style.display = 'none';
            document.getElementById('loadingStatus').style.display = 'none';
            return;
        }

        const baseWordsMap = new Map();
        matchWords.forEach(w => {
            let lower = w.toLowerCase();
            if (!easyWords.has(lower)) {
                let lemma = getLemmaWord(lower);
                if (!easyWords.has(lemma) && lemma.length > 2) {
                    baseWordsMap.set(lemma, true);
                }
            }
        });

        const uniqueWords = [...baseWordsMap.keys()].sort();

        let html = `<h2 style="font-size: 18px; color: #1e293b; margin-top:30px; border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom:15px;">주요 어휘 정리 (AI 실시간 품사 교정 반영)</h2>`;
        html += `<table><tr><th style="width:10%">번호</th><th style="width:40%">영어 단어</th><th style="width:50%">자동 완성 뜻 (정확한 품사형식)</th></tr>`;
        
        // 테이블 구조 먼저 렌더링
        for (let i = 0; i < uniqueWords.length; i++) {
            const displayWord = uniqueWords[i];
            html += `<tr>
                <td>${i+1}</td>
                <td><strong>${displayWord}</strong></td>
                <td><input type="text" id="word-idx-${i}" value="AI가 실시간 번역 중입니다..."></td>
            </tr>`;
        }
        html += `</table>`;
        
        tableContainer.innerHTML = html;
        tableContainer.style.display = 'block';

        // 각 칸에 실시간으로 번역 결과를 순차적으로 입력 (비어있지 않게 채워줌)
        for (let i = 0; i < uniqueWords.length; i++) {
            let trans = await fetchTranslation(uniqueWords[i]);
            document.getElementById(`word-idx-${i}`).value = trans;
        }

        document.getElementById('loadingStatus').style.display = 'none';
    }
</script>
</body>
</html>
