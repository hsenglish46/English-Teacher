<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>돌려돌려 읽어읽어 단어~</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --accent-color: #4f46e5;
            --text-main: #1e293b;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Nanum Gothic', sans-serif;
            overflow: hidden;
        }

        /* 메인 컨테이너 */
        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        /* 1. 깔끔하고 예쁜 초기 설정 화면 */
        #setup-screen {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 40px;
            text-align: center;
        }

        .header-section h1 {
            font-size: 50px;
            color: var(--text-main);
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .header-section p {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 30px;
        }

        .input-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.8);
        }

        textarea {
            width: 100%;
            height: 180px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 20px;
            font-size: 18px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 20px;
        }

        textarea:focus { border-color: var(--accent-color); }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: var(--accent-color); color: white; }
        .btn-secondary { background: #e2e8f0; color: #475569; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* 2. 게임 화면 (돌림판 크기 추가 확대) */
        #game-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .wheel-box {
            position: relative;
            /* 돌림판을 모니터 위아래 꽉 차도록 더 크게 조절 (기존 88vh -> 93vh) */
            width: 93vh;
            height: 93vh;
            max-width: 900px;
            max-height: 900px;
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        /* 빨간 상단 화살표 */
        .arrow-top {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-top: 50px solid #ef4444;
        }

        /* 중앙 GO 버튼 */
        .spin-center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110px;
            height: 110px;
            background: #fff;
            border: 8px solid var(--accent-color);
            border-radius: 50%;
            z-index: 30;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 26px;
            color: var(--accent-color);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* 3. 돌림판 위에 겹쳐서 뜨는 거대 결과창 */
        #result-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(5px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-card {
            background: white;
            width: 90vw;
            max-width: 1100px;
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            text-align: center;
            border: 6px solid var(--accent-color);
            animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #result-word {
            font-size: 170px;
            font-weight: 900;
            color: #1e293b;
            margin: 0 0 40px 0;
            display: block;
            word-wrap: break-word;
            line-height: 1.1;
            letter-spacing: -2px;
        }

        .overlay-btns { display: flex; gap: 30px; justify-content: center; }
        
        .overlay-btns .btn {
            padding: 18px 45px;
            font-size: 24px;
            border-radius: 16px;
        }

        .fullscreen-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            z-index: 50;
        }

        #ocr-status { font-size: 15px; color: #ea580c; margin-bottom: 10px; font-weight: bold; }
    </style>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
</head>
<body>

<div class="game-container" id="main-container">
    
    <div id="setup-screen">
        <div class="header-section">
            <h1>🎲 돌려돌려 읽어읽어 단어~</h1>
            <p>직접 입력하거나, 단어장 이미지를 복사(Ctrl+V)해서 붙여넣어 보세요!</p>
        </div>

        <div class="input-card">
            <div id="ocr-status"></div>
            <textarea id="word-input" placeholder="여기에 영어 단어들을 입력하세요. (쉼표나 엔터로 구분 가능)&#10;★ 팁: 캡처 프로그램 등으로 스샷을 찍은 뒤, 여기를 누르고 'Ctrl + V' 하면 이미지의 단어가 자동 입력됩니다!"></textarea>
            
            <div class="button-group">
                <label class="btn btn-secondary" for="image-upload" style="cursor:pointer;">
                    📸 파일에서 이미지 가져오기
                </label>
                <input type="file" id="image-upload" accept="image/*" style="display:none">
                
                <button class="btn btn-primary" onclick="startGame()">
                    돌림판 만들기 ➡️
                </button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <button class="fullscreen-toggle" onclick="toggleFullScreen()">🖥️ 전체화면 켜기/끄기</button>

        <div class="wheel-box">
            <div class="arrow-top"></div>
            <canvas id="wheelCanvas" width="900" height="900"></canvas>
            <div class="spin-center-btn" onclick="spinWheel()">GO!</div>
        </div>

        <div id="result-overlay">
            <div class="result-card">
                <span id="result-word">Word</span>
                <div class="overlay-btns">
                    <button class="btn btn-primary" style="background:#22c55e" onclick="closeOverlay()">
                        🔄 Try Again
                    </button>
                    <button class="btn btn-primary" style="background:#ef4444" onclick="endGame()">
                        🛑 End
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let words = [];
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    let currentRotation = 0;
    let isSpinning = false;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTick() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
        osc.start(); osc.stop(audioCtx.currentTime + 0.04);
    }

    function playPung() {
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc1.connect(gain); osc2.connect(gain); gain.connect(audioCtx.destination);
        
        osc1.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
        osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime); 
        
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
        
        osc1.start(); osc2.start();
        osc1.stop(audioCtx.currentTime + 0.6); osc2.stop(audioCtx.currentTime + 0.6);
    }

    const colors = ["#FF6B6B", "#4ECDC4", "#FFE66D", "#FF9F43", "#1DD1A1", "#54A0FF", "#5F27CD", "#FF5252", "#00d2d3", "#ff9ff3"];

    function startGame() {
        const input = document.getElementById('word-input').value;
        words = input.split(/[\n,]+/).map(w => w.trim()).filter(w => w.length > 0);
        if (words.length < 2) return alert("단어를 2개 이상 입력해주세요!");

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        drawWheel();
    }

    function drawWheel() {
        const segments = words.length;
        const arc = (2 * Math.PI) / segments;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 현재 전체 회전 상태 고려하지 않고 내부 세그먼트만 드로잉
        for (let i = 0; i < segments; i++) {
            const angle = i * arc;
            
            // 1. 부채꼴 칸 그리기
            ctx.beginPath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.moveTo(450, 450);
            ctx.arc(450, 450, 450, angle, angle + arc);
            ctx.fill();
            ctx.strokeStyle = "#475569";
            ctx.lineWidth = 2;
            ctx.stroke();

            // 2. 단어 텍스트 그리기 (가로 고정형 배치 알고리즘 적용)
            ctx.save();
            
            // 부채꼴의 중간 각도 구하기
            const midAngle = angle + arc / 2;
            
            // 원의 중심에서 글자가 들어갈 적절한 반지름 위치 계산 (원 테두리 근처)
            const textRadius = 310; 
            const textX = 450 + Math.cos(midAngle) * textRadius;
            const textY = 450 + Math.sin(midAngle) * textRadius;
            
            ctx.translate(textX, textY);
            
            // 회전(rotate)하지 않으므로 글자가 언제나 완벽하게 가로(정방향)로 위치합니다!
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            // 기존 사이즈보다 +5pt 이상 폰트 키우기 적용
            let fontSize = 60; 
            if(words[i].length > 6) fontSize = 48;
            if(segments > 6) fontSize = 42;
            if(segments > 10) fontSize = 32;

            ctx.font = `bold ${fontSize}px sans-serif`;
            
            // 하얀색 글씨 바탕 위에 검은색 진한 테두리선(Stroke) 효과 주기
            ctx.strokeStyle = "#000000"; // 검은 테두리
            ctx.lineWidth = 6;            // 테두리 두께 두껍게
            ctx.lineJoin = "round";
            ctx.strokeText(words[i], 0, 0);
            
            ctx.fillStyle = "#ffffff";    // 내부 흰색 글씨
            ctx.fillText(words[i], 0, 0);
            
            ctx.restore();
        }
    }

    function spinWheel() {
        if (isSpinning) return;
        isSpinning = true;
        document.getElementById('result-overlay').style.display = 'none';

        const rotation = Math.floor(Math.random() * 360) + 2160; 
        currentRotation += rotation;
        
        const canvasEl = document.getElementById('wheelCanvas');
        canvasEl.style.transition = "transform 3s cubic-bezier(0.15, 0, 0.15, 1)";
        canvasEl.style.transform = `rotate(${currentRotation}deg)`;

        let lastTick = 0;
        function checkTick(now) {
            if (!isSpinning) return;
            if (now - lastTick > 120) { playTick(); lastTick = now; }
            requestAnimationFrame(checkTick);
        }
        requestAnimationFrame(checkTick);

        setTimeout(() => {
            isSpinning = false;
            playPung(); 
            showResult();
        }, 3000);
    }

    function showResult() {
        const segments = words.length;
        const arc = 360 / segments;
        const degrees = (currentRotation % 360);
        // 화살표가 상단(270도) 기준 계산 보정
        const index = Math.floor((360 - degrees + 270) % 360 / arc);
        
        const wordEl = document.getElementById('result-word');
        wordEl.innerText = words[index]; 

        if(words[index].length > 10) {
            wordEl.style.fontSize = "100px";
        } else if(words[index].length > 7) {
            wordEl.style.fontSize = "130px";
        } else {
            wordEl.style.fontSize = "170px";
        }

        document.getElementById('result-overlay').style.display = 'flex'; 
    }

    function closeOverlay() {
        document.getElementById('result-overlay').style.display = 'none';
    }

    function endGame() {
        if (document.fullscreenElement) document.exitFullscreen();
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('setup-screen').style.display = 'flex';
        document.getElementById('result-overlay').style.display = 'none';
        document.getElementById('word-input').value = ''; 
        document.getElementById('ocr-status').innerText = '';
    }

    function toggleFullScreen() {
        const container = document.getElementById('main-container');
        if (!document.fullscreenElement) {
            container.requestFullscreen().catch(err => {});
        } else {
            document.exitFullscreen();
        }
    }

    // 파일 업로드 처리 함수
    function processImageFile(file) {
        const status = document.getElementById('ocr-status');
        status.innerText = "⏳ 사진에서 영어 단어를 분석하고 있습니다... 잠시만 기다려주세요.";
        Tesseract.recognize(file, 'eng').then(({ data: { text } }) => {
            const found = text.match(/[a-zA-Z]+/g);
            if (found) {
                const currentVal = document.getElementById('word-input').value;
                document.getElementById('word-input').value += (currentVal ? ', ' : '') + found.join(', ');
                status.innerText = "✨ 단어 스캔 및 입력 완료!";
            } else {
                status.innerText = "❌ 이미지에서 영단어를 찾지 못했습니다.";
            }
        }).catch(err => {
            status.innerText = "❌ 분석 도중 오류가 발생했습니다.";
        });
    }

    // 1) 클립보드 스크린샷 붙여넣기(Ctrl + V) 이벤트 구현
    document.addEventListener('paste', function(e) {
        const items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (let i = 0; i < items.length; i++) {
            if (items[i].type.indexOf('image') !== -1) {
                const blob = items[i].getAsFile();
                processImageFile(blob);
                e.preventDefault();
                break;
            }
        }
    });

    // 파일 선택창 이미지 처리
    document.getElementById('image-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) processImageFile(file);
    });
</script>

</body>
</html>
